syntax = "proto3";
package mini_storage;

message WriteBlockRequest {
    uint64 block_id      = 1;
    bytes  data          = 2;
    repeated string pipeline = 3;
}

message WriteBlockResponse {
    bool   success       = 1;
    string error_message = 2;
}

message ReadBlockRequest {
    uint64 block_id  = 1;
    int64  offset    = 2;
    int64  length    = 3;
}

message ReadBlockResponse {
    bool   success       = 1;
    bytes  data          = 2;
    uint32 crc32         = 3;
    string error_message = 4;
}

message DeleteBlockRequest {
    uint64 block_id = 1;
}

message DeleteBlockResponse {
    bool   success       = 1;
    string error_message = 2;
}

message DataNodeRequest {
    enum OpType {
        WRITE_BLOCK  = 0;
        READ_BLOCK   = 1;
        DELETE_BLOCK = 2;
    }
    OpType op         = 1;
    uint64 request_id = 2;

    WriteBlockRequest  write_block  = 10;
    ReadBlockRequest   read_block   = 11;
    DeleteBlockRequest delete_block = 12;
}

message DataNodeResponse {
    bool   success       = 1;
    string error_message = 2;
    uint64 request_id    = 3;

    WriteBlockResponse  write_block  = 10;
    ReadBlockResponse   read_block   = 11;
    DeleteBlockResponse delete_block = 12;
}
